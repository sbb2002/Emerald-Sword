# Render Blueprint — web service + cron job (같은 레포, 같은 Neon DB 공유)
# 비밀값은 envVarGroup 으로 묶어 Render 대시보드에서 1회 입력한다(코드·git 평문 금지).
# 두 서비스는 직접 통신하지 않고 Neon DB(is_paused 등)로만 협력한다.

envVarGroups:
  - name: emerald-sword-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_CANO_REAL
        sync: false
      - key: KIS_CANO_PAPER
        sync: false
      - key: KIS_ACNT_PRDT_CD
        sync: false
      - key: KIS_BASE_URL_REAL
        sync: false
      - key: KIS_BASE_URL_PAPER
        sync: false

services:
  # 텔레그램 webhook 수신 + 명령 처리 (매매 안 함). 유휴 시 spin-down 허용(무료 시간 절약).
  - type: web
    name: emerald-sword-web
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.web:app --host 0.0.0.0 --port $PORT
    # healthCheckPath 미설정 — 설정하면 Render 가 /healthcheck 를 주기적으로 폴링해
    # 서비스가 계속 깨어 있어 무료 시간(~750h/월)을 소진한다. 폴링을 막아 유휴 시
    # spin-down 되게 한다(배포 성공은 포트 바인딩으로 감지). /healthcheck 엔드포인트는
    # 수동 확인용으로 코드에는 유지한다.
    autoDeploy: true
    envVars:
      - fromGroup: emerald-sword-secrets

  # 월 1회: 모멘텀 계산·주문 (Phase B). Phase A 스텁은 is_paused 읽고 보고 후 종료.
  - type: cron
    name: emerald-sword-cron
    runtime: python
    # cron 은 Render 에 무료 플랜이 없는 서비스 타입 → 최소 유료(starter).
    # 과금은 실행 시간 기준이라 월 1회 수 분 실행이면 비용은 매우 작다(~$0.5/월 수준).
    plan: starter
    region: singapore
    # Phase A 스텁 스케줄: 월말 근사(28~31일) 매일 UTC 15:30 = KST 00:30 실행.
    # Phase B(#8)에서 "월 마지막 거래일 + 미국 썸머타임" 게이트로 교체한다.
    schedule: "30 15 28-31 * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.cron
    envVars:
      - fromGroup: emerald-sword-secrets
